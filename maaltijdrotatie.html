<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maaltijdrotatie</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: #FFF8F2; color: #2D2A26; min-height: 100vh; }
::-webkit-scrollbar { display: none; }

.topbar { background: #FF7043; padding: 16px 20px 20px; border-radius: 0 0 24px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 22px; font-weight: 900; color: white; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 1px; }
.topbar-badge { background: rgba(255,255,255,0.22); color: white; font-size: 13px; font-weight: 800; padding: 5px 12px; border-radius: 20px; }
.topbar-back { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; font-weight: 900; padding: 6px 11px; border-radius: 14px; cursor: pointer; font-family: inherit; }
.topbar-close { background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; font-weight: 900; padding: 6px 10px; border-radius: 14px; cursor: pointer; }

.main { padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

.kies-block { background: white; border-radius: 26px; border: 3px solid #FFD0B8; padding: 22px 20px 20px; margin-bottom: 16px; text-align: center; position: relative; overflow: hidden; }
.kies-deco1 { position: absolute; top: -18px; right: -18px; width: 70px; height: 70px; background: #FFE8DC; border-radius: 50%; pointer-events: none; }
.kies-deco2 { position: absolute; bottom: -12px; left: -12px; width: 50px; height: 50px; background: #FFF3EE; border-radius: 50%; pointer-events: none; }
.kies-eyebrow { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #FF7043; margin-bottom: 10px; position: relative; z-index: 1; }
.kies-result { font-size: 23px; font-weight: 900; min-height: 34px; margin-bottom: 18px; color: #2D2A26; line-height: 1.25; position: relative; z-index: 1; transition: opacity 0.06s; }
.kies-result.spinning { opacity: 0.35; }
.kies-result.placeholder { color: #D0C8C0; font-size: 16px; font-weight: 700; }
.kies-row { display: flex; gap: 10px; justify-content: center; position: relative; z-index: 1; }
.kies-main-btn { background: #FF7043; color: white; font-family: inherit; font-weight: 900; font-size: 15px; padding: 12px 26px; border-radius: 20px; border: none; cursor: pointer; box-shadow: 0 4px 0 #C84F28; transition: all 0.12s; }
.kies-main-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #C84F28; }
.kies-sub-btn { background: #FFF0E8; color: #FF7043; font-family: inherit; font-weight: 800; font-size: 14px; padding: 11px 18px; border-radius: 18px; border: 2.5px solid #FFD0B8; cursor: pointer; }

.search-wrap { display: flex; align-items: center; gap: 8px; background: white; border: 2.5px solid #EDE5DC; border-radius: 18px; padding: 0 14px; margin-bottom: 14px; }
.search-wrap input { flex: 1; border: none; outline: none; font-family: inherit; font-size: 14px; font-weight: 600; padding: 11px 0; background: transparent; color: #2D2A26; }
.search-wrap input::placeholder { color: #C8BFB5; }
.search-clear { background: none; border: none; cursor: pointer; color: #C8BFB5; font-size: 20px; font-weight: 900; line-height: 1; }

.section-lbl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #B8AFA5; margin-bottom: 10px; }

.meal-card { border-radius: 22px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; border: 2.5px solid transparent; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; }
.meal-card:active { transform: scale(0.98); }
.meal-name { font-size: 16px; font-weight: 800; margin-bottom: 5px; }
.meal-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.chip { display: inline-block; background: rgba(255,255,255,0.65); color: #6A5A4A; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.07); }
.time-tag { font-size: 11px; font-weight: 700; color: #8A7A6A; }
.card-arrow { font-size: 22px; color: rgba(0,0,0,0.18); font-weight: 900; }

.detail-hero-box { padding: 16px 16px 0; }
.detail-hero-inner { border-radius: 24px; padding: 22px; }
.detail-name { font-size: 26px; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
.detail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.detail-chip { background: rgba(255,255,255,0.6); border: 2px solid rgba(0,0,0,0.07); color: #5A4A3A; font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 12px; }
.detail-body { padding: 14px 16px 8px; }
.block { background: white; border-radius: 20px; border: 2.5px solid #F0E8DF; padding: 16px 18px; margin-bottom: 14px; }
.block-title { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #FF7043; margin-bottom: 12px; }
.ing-item { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; font-weight: 600; padding: 6px 0; border-bottom: 1.5px solid #F8F4F0; }
.ing-item:last-child { border-bottom: none; }
.ing-dot { color: #FF7043; font-size: 18px; line-height: 1.3; }
.recipe-txt { font-size: 14px; font-weight: 600; line-height: 1.85; color: #4A3A2A; }
.note-txt { font-size: 13px; font-weight: 600; color: #9A8A7A; margin-top: 10px; font-style: italic; }
.detail-actions { display: flex; gap: 10px; padding: 0 16px 28px; }

.btn-outline { background: white; color: #2D2A26; padding: 11px 18px; font-size: 14px; border: 2.5px solid #E8E0D8; border-radius: 16px; font-family: inherit; font-weight: 800; cursor: pointer; flex: 1; }
.btn-danger { background: #FFE8E8; color: #CC2222; padding: 11px 18px; font-size: 14px; border: 2px solid #FFBEBE; border-radius: 16px; font-family: inherit; font-weight: 800; cursor: pointer; flex: 1; }
.btn-primary { background: #FF7043; color: white; padding: 13px 20px; font-size: 15px; border: none; border-radius: 18px; box-shadow: 0 3px 0 #C84F28; font-family: inherit; font-weight: 900; cursor: pointer; width: 100%; }
.btn-inlezen { background: #FF7043; color: white; padding: 12px; font-size: 14px; border: none; border-radius: 16px; box-shadow: 0 3px 0 #C84F28; font-family: inherit; font-weight: 900; cursor: pointer; width: 100%; }

.fab { position: fixed; bottom: 24px; right: 20px; background: #FF7043; color: white; width: 56px; height: 56px; border-radius: 50%; font-size: 28px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 4px 0 #C84F28, 0 8px 20px rgba(255,112,67,0.35); line-height: 1; }

.form-main { padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
.tab-row { display: flex; background: white; border-radius: 18px; border: 2.5px solid #EDE5DC; padding: 4px; margin-bottom: 16px; gap: 4px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 800; cursor: pointer; color: #B8AFA5; border-radius: 14px; transition: all 0.14s; border: none; background: transparent; font-family: inherit; }
.tab.active { background: #FF7043; color: white; }
.paste-area { background: #FFF8F4; border: 2.5px dashed #FFD0B8; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
.paste-hint { font-size: 12px; font-weight: 600; color: #B8AFA5; margin-top: 10px; line-height: 1.6; }
.fg { margin-bottom: 14px; }
.fl { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #B8AFA5; margin-bottom: 6px; display: block; }
.fi { width: 100%; border: 2.5px solid #E8E0D8; border-radius: 14px; padding: 11px 14px; font-family: inherit; font-size: 14px; font-weight: 600; outline: none; background: white; color: #2D2A26; }
.fi:focus { border-color: #FF7043; }
.fi-ta { min-height: 90px; resize: vertical; }
.ing-row { display: flex; gap: 6px; margin-bottom: 7px; }
.ing-rm { background: #FFE8E8; color: #CC2222; border: 2px solid #FFBEBE; border-radius: 11px; width: 36px; font-size: 18px; font-weight: 900; cursor: pointer; font-family: inherit; }

.empty { text-align: center; padding: 36px 20px; }
.empty-e { font-size: 42px; margin-bottom: 10px; }
.empty-t { font-size: 16px; font-weight: 800; color: #B8AFA5; }
.empty-s { font-size: 13px; font-weight: 600; color: #C8BFB5; margin-top: 4px; }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #2D2A26; color: white; padding: 11px 22px; border-radius: 22px; font-size: 14px; font-weight: 700; z-index: 100; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }

.modal-overlay { position: fixed; inset: 0; background: rgba(45,42,38,0.5); z-index: 50; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box { background: white; border-radius: 26px 26px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; }
.modal-title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.modal-body { font-size: 14px; font-weight: 600; color: #8A7A6A; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }

.hidden { display: none; }
</style>

</head>
<body>

<!-- HOME VIEW -->

<div id="view-home">
  <div class="topbar">
    <div>
      <div class="topbar-title">Maaltijdrotatie</div>
      <div class="topbar-sub">Alfred - Keuken</div>
    </div>
    <span class="topbar-badge" id="meal-count">0 gerechten</span>
  </div>
  <div class="main">
    <div class="kies-block">
      <div class="kies-deco1"></div>
      <div class="kies-deco2"></div>
      <div class="kies-eyebrow">Geen inspiratie?</div>
      <div class="kies-result placeholder" id="kies-result">Druk op kies maaltijd</div>
      <div class="kies-row">
        <button class="kies-main-btn" onclick="kiesMaaltijd()">Kies maaltijd</button>
        <button class="kies-sub-btn hidden" id="kies-recept-btn" onclick="openKiesDetail()">Recept</button>
      </div>
    </div>
    <div class="search-wrap">
      <span style="color:#C8BFB5;font-size:16px">&#128269;</span>
      <input type="text" id="search-input" placeholder="Zoek op naam of tag..." oninput="renderMeals()">
      <button class="search-clear" onclick="clearSearch()">x</button>
    </div>
    <div class="section-lbl" id="meal-section-lbl"></div>
    <div id="meal-list"></div>
  </div>
  <button class="fab" onclick="showAdd()">+</button>
</div>

<!-- DETAIL VIEW -->

<div id="view-detail" class="hidden">
  <div class="topbar">
    <button class="topbar-back" onclick="showHome()">&#8592;</button>
    <div style="color:white;font-weight:900;font-size:16px;flex:1;margin-left:12px" id="detail-topbar-name"></div>
  </div>
  <div class="detail-hero-box">
    <div class="detail-hero-inner" id="detail-hero"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="detail-actions">
    <button class="btn-outline" onclick="editCurrent()">Bewerken</button>
    <button class="btn-danger" onclick="confirmDeleteCurrent()">Verwijderen</button>
  </div>
</div>

<!-- ADD/EDIT VIEW -->

<div id="view-add" class="hidden">
  <div class="topbar">
    <div style="color:white;font-weight:900;font-size:20px" id="add-title">Nieuw gerecht</div>
    <button class="topbar-close" onclick="showHome()">&#x2715;</button>
  </div>
  <div class="form-main">
    <div class="tab-row">
      <button class="tab active" id="tab-paste" onclick="switchTab('paste')">Plakken</button>
      <button class="tab" id="tab-manual" onclick="switchTab('manual')">Handmatig</button>
    </div>
    <div id="paste-panel">
      <div class="paste-area">
        <label class="fl">Plak je recept hier</label>
        <textarea class="fi fi-ta" id="paste-input" style="background:transparent;border:none;padding:0;min-height:160px" placeholder="Kip Tandoori&#10;Bereidingstijd: 25 min&#10;Tags: kip, oven&#10;&#10;Ingredienten:&#10;- 500g kipfilet&#10;&#10;Bereiding:&#10;Marineer de kip..."></textarea>
        <div class="paste-hint">Naam bovenaan, dan optioneel Bereidingstijd:, Tags:, Ingredienten: en Bereiding:.</div>
      </div>
      <button class="btn-inlezen" onclick="doParse()">Inlezen</button>
    </div>
    <div id="manual-panel" class="hidden">
      <div class="fg">
        <label class="fl">Naam *</label>
        <input class="fi" id="f-name" placeholder="Bijv. Kip Tandoori">
      </div>
      <div style="display:flex;gap:10px">
        <div class="fg" style="flex:1">
          <label class="fl">Tijd</label>
          <input class="fi" id="f-time" placeholder="25 min">
        </div>
        <div class="fg" style="flex:2">
          <label class="fl">Tags</label>
          <input class="fi" id="f-tags" placeholder="kip, pasta, snel">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Ingredienten</label>
        <div id="ing-list"></div>
        <div class="ing-row">
          <input class="fi" id="new-ing" placeholder="+ toevoegen (Enter)" onkeydown="if(event.key==='Enter'){addIng();event.preventDefault()}" style="flex:1">
          <button onclick="addIng()" style="background:#FF7043;color:white;border:none;border-radius:12px;padding:10px 14px;font-weight:900;font-size:16px;cursor:pointer">+</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Bereiding</label>
        <textarea class="fi fi-ta" id="f-recipe" placeholder="Beschrijf de bereiding..."></textarea>
      </div>
      <div class="fg">
        <label class="fl">Tip</label>
        <input class="fi" id="f-note" placeholder="Bijv. verse Parmezaan loont hier">
      </div>
      <button class="btn-primary" onclick="doSave()">Opslaan in rotatie</button>
    </div>
  </div>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Gerecht verwijderen?</div>
    <div class="modal-body">Dit kan niet ongedaan worden gemaakt.</div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Annuleren</button>
      <button class="btn-danger" onclick="doDelete()">Verwijderen</button>
    </div>
  </div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'meal-rotation-data';
const COLORS = ['#FFE5D0','#D4F0E0','#D0E8FF','#F5D0FF','#FFF3CC','#FFD6D6','#D0FFF5','#EDD0FF','#E0F5D0','#FFE0D0'];

const DEFAULT_MEALS = [
  { id: '1', name: 'Kip Tandoori', tags: ['kip','oven'], prepTime: '25 min', ingredients: ['500g kipfilet','150g Griekse yoghurt','2 tl tandoorikruiden','1 tl kurkuma','2 knoflookteentjes','1 citroen','naanbrood of rijst','komkommer','munt'], recipe: 'Marineer kip 30 min in yoghurt en kruiden. Grill of bak op hoog vuur 6-7 min per kant. Serveer met naanbrood en komkommersalade.', groceryNote: 'Controleer: yoghurt, tandoorikruiden' },
  { id: '2', name: 'Pasta Alfredo met Kip en Broccoli', tags: ['pasta','kip'], prepTime: '25 min', ingredients: ['400g tagliatelle','300g kipfilet','300g broccoli','200ml slagroom','50g Parmezaan','2 knoflookteentjes','boter','zout peper nootmuskaat'], recipe: 'Kook pasta al dente. Bak kip en knoflook in boter. Blancheer broccoli. Maak saus van room en Parmezaan op laag vuur. Meng alles door elkaar.', groceryNote: 'Verse Parmezaan loont hier' },
  { id: '3', name: 'Poke Bowl Zalm', tags: ['vis','gezond','no-cook'], prepTime: '20 min', ingredients: ['300g zalmfilet','200g sushirijst','1 avocado','100g edamame','1 komkommer','3 el sojasaus','1 tl sesamolie','sesam','ingelegde gember'], recipe: 'Kook rijst. Snijd zalm in blokjes, marineer 10 min in soja en sesamolie. Leg alles in een bowl op rijst. Garneer met sesam.', groceryNote: 'Edamame diepvries is prima' }
];

let meals = [];
let currentMeal = null;
let editingId = null;
let currentIngredients = [];
let rolledMeal = null;
let rollingInterval = null;

function getColor(id) { return COLORS[parseInt(id || 0) % COLORS.length]; }

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    meals = s ? JSON.parse(s) : DEFAULT_MEALS;
  } catch(e) { meals = DEFAULT_MEALS; }
}

function saveMeals() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(meals)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showView(id) {
  ['view-home','view-detail','view-add'].forEach(v => document.getElementById(v).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0,0);
}

function showHome() { showView('view-home'); renderMeals(); editingId = null; currentIngredients = []; }

function renderMeals() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = meals.filter(m => m.name.toLowerCase().includes(q) || (m.tags||[]).some(t => t.toLowerCase().includes(q)));
  document.getElementById('meal-count').textContent = meals.length + ' gerechten';
  document.getElementById('meal-section-lbl').textContent = filtered.length + ' gerecht' + (filtered.length !== 1 ? 'en' : '');
  const list = document.getElementById('meal-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-e">&#127374;</div><div class="empty-t">Geen gerechten gevonden</div><div class="empty-s">Tap + om toe te voegen</div></div>';
    return;
  }
  list.innerHTML = filtered.map(m => {
    const col = getColor(m.id);
    const tags = (m.tags||[]).map(t => '<span class="chip">' + t + '</span>').join('');
    const time = m.prepTime ? '<span class="time-tag">&#9201; ' + m.prepTime + ' &nbsp;</span>' : '';
    return '<div class="meal-card" style="background:' + col + '" onclick="openDetail(\'' + m.id + '\')">' +
      '<div><div class="meal-name">' + m.name + '</div><div class="meal-meta">' + time + tags + '</div></div>' +
      '<span class="card-arrow">&#8250;</span></div>';
  }).join('');
}

function clearSearch() { document.getElementById('search-input').value = ''; renderMeals(); }

function kiesMaaltijd() {
  if (meals.length === 0) return;
  if (rollingInterval) clearInterval(rollingInterval);
  let count = 0;
  const el = document.getElementById('kies-result');
  el.classList.remove('placeholder');
  rollingInterval = setInterval(() => {
    const r = meals[Math.floor(Math.random() * meals.length)];
    el.textContent = r.name;
    count++;
    if (count > 14) {
      clearInterval(rollingInterval);
      rolledMeal = meals[Math.floor(Math.random() * meals.length)];
      el.textContent = rolledMeal.name;
      document.getElementById('kies-recept-btn').classList.remove('hidden');
    }
  }, 75);
}

function openKiesDetail() { if (rolledMeal) openDetail(rolledMeal.id); }

function openDetail(id) {
  currentMeal = meals.find(m => m.id === id);
  if (!currentMeal) return;
  const col = getColor(currentMeal.id);
  document.getElementById('detail-topbar-name').textContent = currentMeal.name;
  const chips = (currentMeal.prepTime ? '<span class="detail-chip">&#9201; ' + currentMeal.prepTime + '</span>' : '') +
    (currentMeal.tags||[]).map(t => '<span class="detail-chip">' + t + '</span>').join('');
  document.getElementById('detail-hero').style.background = col;
  document.getElementById('detail-hero').innerHTML = '<div class="detail-name">' + currentMeal.name + '</div><div class="detail-chips">' + chips + '</div>';
  let body = '';
  if ((currentMeal.ingredients||[]).length > 0) {
    const ings = currentMeal.ingredients.map(i => '<div class="ing-item"><span class="ing-dot">&#183;</span><span>' + i + '</span></div>').join('');
    const note = currentMeal.groceryNote ? '<div class="note-txt">&#128161; ' + currentMeal.groceryNote + '</div>' : '';
    body += '<div class="block"><div class="block-title">&#128722; Boodschappenlijst</div>' + ings + note + '</div>';
  }
  if (currentMeal.recipe) {
    body += '<div class="block"><div class="block-title">&#128105;&#8205;&#127859; Bereiding</div><div class="recipe-txt">' + currentMeal.recipe + '</div></div>';
  }
  document.getElementById('detail-body').innerHTML = body;
  showView('view-detail');
}

function editCurrent() { if (currentMeal) showAdd(currentMeal.id); }
function confirmDeleteCurrent() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function doDelete() {
  if (!currentMeal) return;
  meals = meals.filter(m => m.id !== currentMeal.id);
  saveMeals();
  closeModal();
  showToast('Verwijderd');
  showHome();
}

function showAdd(id) {
  editingId = id || null;
  currentIngredients = [];
  document.getElementById('add-title').textContent = id ? 'Bewerken' : 'Nieuw gerecht';
  document.getElementById('f-name').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-recipe').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('paste-input').value = '';
  if (id) {
    const m = meals.find(x => x.id === id);
    if (m) {
      document.getElementById('f-name').value = m.name || '';
      document.getElementById('f-time').value = m.prepTime || '';
      document.getElementById('f-tags').value = (m.tags||[]).join(', ');
      document.getElementById('f-recipe').value = m.recipe || '';
      document.getElementById('f-note').value = m.groceryNote || '';
      currentIngredients = [...(m.ingredients||[])];
    }
    switchTab('manual');
  } else {
    switchTab('paste');
  }
  renderIngList();
  showView('view-add');
}

function switchTab(tab) {
  document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
  document.getElementById('tab-manual').classList.toggle('active', tab === 'manual');
  document.getElementById('paste-panel').classList.toggle('hidden', tab !== 'paste');
  document.getElementById('manual-panel').classList.toggle('hidden', tab !== 'manual');
}

function doParse() {
  const text = document.getElementById('paste-input').value.trim();
  if (!text) return;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let name = '', prepTime = '', tags = [], ingredients = [], recipe = '', groceryNote = '';
  let section = null;
  const recipeLines = [];
  lines.forEach((line, i) => {
    const lower = line.toLowerCase();
    if (i === 0 && !lower.startsWith('naam:') && !lower.startsWith('recept:')) { name = line; return; }
    if (lower.startsWith('naam:')) { name = line.replace(/^naam:\s*/i,''); return; }
    if (lower.startsWith('bereidingstijd:') || lower.startsWith('tijd:')) { prepTime = line.replace(/^(bereidingstijd|tijd):\s*/i,''); return; }
    if (lower.startsWith('tags:')) { tags = line.replace(/^tags:\s*/i,'').split(',').map(t => t.trim()); return; }
    if (lower.startsWith('ingredi')) { section = 'ing'; return; }
    if (lower.startsWith('bereiding:') || lower.startsWith('recept:')) { section = 'recipe'; return; }
    if (lower.startsWith('notitie:') || lower.startsWith('tip:')) { groceryNote = line.replace(/^(notitie|tip):\s*/i,''); section = null; return; }
    if (section === 'ing') ingredients.push(line.replace(/^[-*]\s*/,''));
    else if (section === 'recipe') recipeLines.push(line);
  });
  recipe = recipeLines.join(' ');
  if (!name) name = 'Nieuw gerecht';
  document.getElementById('f-name').value = name;
  document.getElementById('f-time').value = prepTime;
  document.getElementById('f-tags').value = tags.join(', ');
  document.getElementById('f-recipe').value = recipe;
  document.getElementById('f-note').value = groceryNote;
  currentIngredients = ingredients;
  renderIngList();
  switchTab('manual');
  showToast('Ingelezen - check de velden');
}

function renderIngList() {
  const list = document.getElementById('ing-list');
  list.innerHTML = currentIngredients.map((ing, i) =>
    '<div class="ing-row"><input class="fi" style="flex:1" value="' + ing.replace(/"/g,'&quot;') + '" onchange="currentIngredients[' + i + ']=this.value"><button class="ing-rm" onclick="removeIng(' + i + ')">x</button></div>'
  ).join('');
}

function addIng() {
  const v = document.getElementById('new-ing').value.trim();
  if (!v) return;
  currentIngredients.push(v);
  document.getElementById('new-ing').value = '';
  renderIngList();
}

function removeIng(i) { currentIngredients.splice(i,1); renderIngList(); }

function doSave() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Naam is verplicht'); return; }
  const meal = {
    id: editingId || Date.now().toString(),
    name,
    prepTime: document.getElementById('f-time').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    ingredients: currentIngredients,
    recipe: document.getElementById('f-recipe').value.trim(),
    groceryNote: document.getElementById('f-note').value.trim()
  };
  if (editingId) {
    meals = meals.map(m => m.id === editingId ? meal : m);
    showToast('Opgeslagen');
  } else {
    meals.push(meal);
    showToast('Toegevoegd!');
  }
  saveMeals();
  editingId = null;
  currentIngredients = [];
  showHome();
}

load();
renderMeals();
</script>
